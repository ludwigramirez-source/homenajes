<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obituario — Agua</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#1f5d70; }

  .stage-wrap {
    position: fixed; inset: 0;
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at 50% 40%, #2f8499, #133f4d);
  }
  .stage {
    position:relative;
    width:100vw; height:56.25vw; max-height:100vh; max-width:177.78vh;
    overflow:hidden;
    background:
      radial-gradient(ellipse at 45% 38%, rgba(225,245,250,0.85), rgba(225,245,250,0) 50%),
      radial-gradient(ellipse at 75% 70%, rgba(60,150,170,0.5), rgba(60,150,170,0) 55%),
      linear-gradient(180deg, #cdeaf2 0%, #8fcad9 28%, #4ea3bb 60%, #2c7d96 85%, #1c6178 100%);
  }

  .watercolor {
    position:absolute; inset:-10%;
    background:
      radial-gradient(circle at 25% 35%, rgba(255,255,255,0.55) 0 9%, transparent 32%),
      radial-gradient(circle at 62% 60%, rgba(220,245,250,0.45) 0 11%, transparent 36%),
      radial-gradient(circle at 82% 28%, rgba(150,210,225,0.4) 0 12%, transparent 40%),
      radial-gradient(circle at 38% 80%, rgba(70,160,180,0.35) 0 10%, transparent 38%);
    filter: blur(9px);
    animation: drift 30s ease-in-out infinite alternate;
  }
  @keyframes drift { from{transform:translate(0,0) scale(1.02);} to{transform:translate(2%,1.5%) scale(1.06);} }

  /* Cáusticas de luz (resplandor ondulante suave) */
  .caustics {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.10), transparent 55%),
      radial-gradient(ellipse at 70% 40%, rgba(255,255,255,0.08), transparent 60%);
    mix-blend-mode: screen;
    animation: shimmer 14s ease-in-out infinite alternate;
    pointer-events:none;
  }
  @keyframes shimmer { from{transform:translate(0,0);} to{transform:translate(2%,1.5%);} }

  /* Ondas en la superficie (parte superior) */
  .waves { position:absolute; left:0; right:0; top:0; height:30%;
           overflow:hidden; pointer-events:none; opacity:.5; }
  .wave { position:absolute; left:-50%; width:200%; height:100%;
          background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.25), transparent 60%);
          animation: sway 12s ease-in-out infinite; }
  .wave.b { animation-duration:16s; animation-delay:-4s; opacity:.6; }
  @keyframes sway { 0%,100%{transform:translateX(-3%);} 50%{transform:translateX(3%);} }

  .sparkle { position:absolute; width:5px; height:5px; border-radius:50%;
    background: radial-gradient(circle, #fff, rgba(255,255,255,0)); opacity:0;
    animation: twinkle 7s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:0; transform:scale(.5);} 50%{opacity:.8; transform:scale(1);} }

  .frame-outer { position:absolute; inset:1.2%; border:4px solid #3f8295;
    box-shadow:0 0 16px rgba(60,130,150,.4); }
  .frame-inner { position:absolute; inset:2.6%; border:2px solid #6fb0c4;
    box-shadow: inset 0 0 8px rgba(120,190,210,.4); }

  /* Burbujas que ascienden */
  .bubbles { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .bubble {
    position:absolute; bottom:-5%;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.15) 55%, rgba(255,255,255,0.05) 100%);
    border: 1px solid rgba(255,255,255,0.4);
    opacity:0;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0) translateX(0); opacity:0; }
    10%  { opacity:.85; }
    85%  { opacity:.7; }
    100% { transform: translateY(-118vh) translateX(40px); opacity:0; }
  }

  .content { position:absolute; inset:0; }
</style>
</head>
<body>
<div class="stage-wrap">
  <div class="stage" id="stage">

    <div class="watercolor"></div>
    <div class="caustics"></div>

    <!-- Ondas de superficie -->
    <div class="waves"><div class="wave"></div><div class="wave b"></div></div>

    <!-- Burbujas -->
    <div class="bubbles" id="bubbles"></div>

    <div class="frame-outer"></div>
    <div class="frame-inner"></div>
    <div class="content"></div>

  </div>
</div>

<script>
  const bubbles = document.getElementById('bubbles');
  const B = 28;
  for(let i=0;i<B;i++){
    const b=document.createElement('div');
    b.className='bubble';
    const d = 6 + Math.random()*22;
    b.style.width = d+'px';
    b.style.height = d+'px';
    b.style.left = (Math.random()*100) + '%';
    b.style.animationDuration = (12 + Math.random()*12) + 's';  // ascenso lento
    b.style.animationDelay = (-Math.random()*22) + 's';
    bubbles.appendChild(b);
  }

  const stage = document.getElementById('stage');
  for(let i=0;i<24;i++){
    const sp=document.createElement('div');
    sp.className='sparkle';
    sp.style.left=(Math.random()*100)+'%';
    sp.style.top=(Math.random()*100)+'%';
    sp.style.animationDelay=(-Math.random()*7)+'s';
    stage.appendChild(sp);
  }
</script>
</body>
</html>
