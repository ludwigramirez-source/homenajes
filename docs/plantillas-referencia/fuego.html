<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obituario — Fuego</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#5a2a26; }

  .stage-wrap {
    position: fixed; inset: 0;
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at 50% 60%, #7a3a2c, #43201d);
  }
  .stage {
    position:relative;
    width:100vw; height:56.25vw; max-height:100vh; max-width:177.78vh;
    overflow:hidden;
    background:
      radial-gradient(ellipse at 50% 92%, rgba(255,180,70,0.55), rgba(255,180,70,0) 45%),
      radial-gradient(ellipse at 45% 50%, rgba(255,225,180,0.35), rgba(255,225,180,0) 50%),
      radial-gradient(ellipse at 78% 30%, rgba(200,80,40,0.4), rgba(200,80,40,0) 55%),
      linear-gradient(180deg, #3a1a18 0%, #5e2a20 40%, #94472a 70%, #c8722f 100%);
  }

  .watercolor {
    position:absolute; inset:-10%;
    background:
      radial-gradient(circle at 30% 70%, rgba(255,160,60,0.4) 0 10%, transparent 34%),
      radial-gradient(circle at 60% 85%, rgba(255,120,40,0.4) 0 12%, transparent 38%),
      radial-gradient(circle at 80% 60%, rgba(180,60,30,0.4) 0 12%, transparent 40%),
      radial-gradient(circle at 40% 55%, rgba(255,210,150,0.3) 0 10%, transparent 36%);
    filter: blur(10px);
    animation: drift 22s ease-in-out infinite alternate;
  }
  @keyframes drift { from{transform:translate(0,0) scale(1.03);} to{transform:translate(1.5%,-1.5%) scale(1.08);} }

  /* Resplandor inferior que late suavemente */
  .glow {
    position:absolute; left:0; right:0; bottom:0; height:55%;
    background: radial-gradient(ellipse at 50% 100%, rgba(255,170,60,0.55), rgba(255,120,40,0.18) 45%, transparent 70%);
    filter: blur(6px);
    animation: pulse 6s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes pulse { 0%,100%{opacity:.7; transform:scaleY(1);} 50%{opacity:1; transform:scaleY(1.08);} }

  /* Llamas suaves en la base */
  .flames { position:absolute; left:0; right:0; bottom:-2%; height:40%;
            pointer-events:none; }
  .flame {
    position:absolute; bottom:0;
    width:120px; height:200px;
    background: radial-gradient(ellipse at 50% 100%,
                rgba(255,220,120,0.9), rgba(255,150,50,0.6) 40%, rgba(220,80,30,0.15) 70%, transparent 80%);
    border-radius: 50% 50% 45% 45% / 70% 70% 30% 30%;
    filter: blur(8px);
    transform-origin: 50% 100%;
    animation: flicker ease-in-out infinite;
  }
  @keyframes flicker {
    0%,100% { transform: scaleY(1) scaleX(1) skewX(0deg); opacity:.85; }
    25%     { transform: scaleY(1.12) scaleX(0.95) skewX(3deg); opacity:1; }
    50%     { transform: scaleY(0.95) scaleX(1.05) skewX(-3deg); opacity:.8; }
    75%     { transform: scaleY(1.08) scaleX(0.97) skewX(2deg); opacity:.95; }
  }

  /* Brasas / chispas que suben */
  .embers { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .ember {
    position:absolute; bottom:-4%;
    width:7px; height:7px; border-radius:50%;
    background: radial-gradient(circle, #ffe7a8, #ff8a2e 60%, rgba(255,90,30,0) 100%);
    opacity:0;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0) translateX(0) scale(1); opacity:0; }
    10%  { opacity:1; }
    80%  { opacity:.9; }
    100% { transform: translateY(-115vh) translateX(60px) scale(.3); opacity:0; }
  }

  .frame-outer { position:absolute; inset:1.2%; border:4px solid #b5732e;
    box-shadow:0 0 20px rgba(255,140,50,.45); }
  .frame-inner { position:absolute; inset:2.6%; border:2px solid #e0a64e;
    box-shadow: inset 0 0 10px rgba(255,170,70,.4); }

  .content { position:absolute; inset:0; }
</style>
</head>
<body>
<div class="stage-wrap">
  <div class="stage" id="stage">

    <div class="watercolor"></div>
    <div class="glow"></div>

    <!-- Llamas -->
    <div class="flames" id="flames"></div>

    <!-- Brasas -->
    <div class="embers" id="embers"></div>

    <div class="frame-outer"></div>
    <div class="frame-inner"></div>
    <div class="content"></div>

  </div>
</div>

<script>
  // llamas distribuidas a lo largo de la base
  const flames = document.getElementById('flames');
  const F = 9;
  for(let i=0;i<F;i++){
    const fl=document.createElement('div');
    fl.className='flame';
    const w = 90 + Math.random()*120;
    fl.style.width = w+'px';
    fl.style.height = (w*1.6)+'px';
    fl.style.left = (i*(100/F) + (Math.random()*6-3)) + '%';
    fl.style.animationDuration = (2.2 + Math.random()*1.8) + 's';
    fl.style.animationDelay = (-Math.random()*3) + 's';
    fl.style.opacity = 0.6 + Math.random()*0.4;
    flames.appendChild(fl);
  }

  // brasas
  const embers = document.getElementById('embers');
  const E = 40;
  for(let i=0;i<E;i++){
    const e=document.createElement('div');
    e.className='ember';
    e.style.left = (Math.random()*100) + '%';
    e.style.animationDuration = (14 + Math.random()*12) + 's';   // ascenso lento
    e.style.animationDelay = (-Math.random()*26) + 's';
    const sc = 0.4 + Math.random()*1.0;
    e.style.transform = 'scale('+sc+')';
    embers.appendChild(e);
  }
</script>
</body>
</html>
