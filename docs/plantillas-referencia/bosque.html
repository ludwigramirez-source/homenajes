<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obituario — Tierra (Bosque)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#5d4a2c; }

  .stage-wrap {
    position: fixed; inset: 0;
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at 50% 40%, #b08a4a, #4a3a22);
  }
  .stage {
    position:relative;
    width:100vw; height:56.25vw; max-height:100vh; max-width:177.78vh;
    overflow:hidden;
    background:
      radial-gradient(ellipse at 62% 30%, rgba(255,236,180,0.9), rgba(255,236,180,0) 45%),
      radial-gradient(ellipse at 40% 70%, rgba(120,95,50,0.5), rgba(120,95,50,0) 55%),
      linear-gradient(170deg, #7a5e30 0%, #a07d3e 25%, #c9a155 48%, #9c7838 72%, #5f4824 100%);
  }

  /* Bruma cálida del bosque */
  .haze {
    position:absolute; inset:-10%;
    background:
      radial-gradient(circle at 60% 35%, rgba(255,240,190,0.5) 0 12%, transparent 40%),
      radial-gradient(circle at 30% 60%, rgba(200,160,90,0.35) 0 12%, transparent 42%),
      radial-gradient(circle at 80% 70%, rgba(120,90,45,0.4) 0 14%, transparent 44%);
    filter: blur(12px);
    animation: drift 30s ease-in-out infinite alternate;
  }
  @keyframes drift { from{transform:translate(0,0) scale(1.03);} to{transform:translate(-1.5%,1.5%) scale(1.07);} }

  /* Suelo del bosque */
  .ground {
    position:absolute; left:0; right:0; bottom:0; height:22%;
    background: linear-gradient(180deg, rgba(90,68,34,0) 0%, rgba(80,60,30,0.4) 55%, rgba(60,44,22,0.6) 100%);
    filter: blur(2px);
  }

  /* Árboles del bosque (silueta) */
  .forest { position:absolute; inset:0; pointer-events:none; }
  .tree { position:absolute; bottom:0; transform-origin: bottom center; }
  .tree svg { display:block; width:100%; height:auto; }
  .sway { animation: sway 14s ease-in-out infinite; }
  .sway.b { animation-duration:18s; animation-delay:-5s; }
  @keyframes sway { 0%,100%{transform:rotate(-0.5deg);} 50%{transform:rotate(0.7deg);} }

  /* Dosel superior difuso */
  .canopy {
    position:absolute; left:0; right:0; top:-4%; height:24%;
    background:
      radial-gradient(ellipse at 15% 50%, rgba(45,38,20,0.75), transparent 60%),
      radial-gradient(ellipse at 85% 55%, rgba(45,38,20,0.75), transparent 60%);
    filter: blur(10px);
    pointer-events:none;
  }

  /* Rayos de sol (god rays) */
  .rays { position:absolute; inset:0; overflow:hidden; pointer-events:none;
          mix-blend-mode: screen; }
  .ray {
    position:absolute; top:-20%;
    width:14%; height:150%;
    background: linear-gradient(180deg, rgba(255,240,190,0.55), rgba(255,235,180,0.12) 55%, transparent 85%);
    transform-origin: top center;
    filter: blur(6px);
    animation: rayPulse ease-in-out infinite;
  }
  @keyframes rayPulse { 0%,100%{opacity:.35;} 50%{opacity:.7;} }

  /* Partículas de polen / polvo flotando en la luz */
  .motes { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .mote {
    position:absolute;
    width:6px; height:6px; border-radius:50%;
    background: radial-gradient(circle, rgba(255,245,210,0.95), rgba(255,235,180,0) 70%);
    opacity:0;
    animation: floatMote linear infinite;
  }
  @keyframes floatMote {
    0%   { transform: translateY(0) translateX(0); opacity:0; }
    15%  { opacity:.9; }
    85%  { opacity:.7; }
    100% { transform: translateY(-70vh) translateX(40px); opacity:0; }
  }

  /* Hojas cayendo (otoñales, cálidas) */
  .leaves { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .leaf { position:absolute; top:-6%; width:22px; height:18px; opacity:0;
          animation: fall linear infinite; }
  .leaf svg { width:100%; height:100%; }
  @keyframes fall {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    8%   { opacity:.9; }
    92%  { opacity:.85; }
    100% { transform: translateY(118vh) translateX(-90px) rotate(380deg); opacity:.1; }
  }

  .frame-outer { position:absolute; inset:1.2%; border:4px solid #7a5a2c;
    box-shadow:0 0 18px rgba(120,90,40,.4); }
  .frame-inner { position:absolute; inset:2.6%; border:2px solid #c79a4e;
    box-shadow: inset 0 0 8px rgba(200,160,80,.4); }

  .content { position:absolute; inset:0; }
</style>
</head>
<body>
<div class="stage-wrap">
  <div class="stage" id="stage">

    <div class="haze"></div>
    <div class="canopy"></div>

    <!-- Bosque (troncos) -->
    <div class="forest" id="forest"></div>

    <div class="ground"></div>

    <!-- Rayos de sol -->
    <div class="rays" id="rays"></div>

    <!-- Polen flotando -->
    <div class="motes" id="motes"></div>

    <!-- Hojas cayendo -->
    <div class="leaves" id="leaves"></div>

    <div class="frame-outer"></div>
    <div class="frame-inner"></div>
    <div class="content"></div>

  </div>
</div>

<script>
  // --- árboles del bosque en silueta, a los lados para dejar centro libre ---
  const forest = document.getElementById('forest');

  // genera un árbol SVG (tronco + ramas + copa de masas) con un tono dado
  function treeSVG(tone){
    return `<svg viewBox="0 0 200 480" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax meet">
      <g fill="none" stroke="${tone}" stroke-linecap="round">
        <path d="M100 480 C 96 360, 100 280, 102 210" stroke-width="20"/>
        <path d="M102 250 C 78 225, 60 210, 42 196" stroke-width="11"/>
        <path d="M101 235 C 124 212, 144 198, 162 184" stroke-width="11"/>
        <path d="M102 215 C 96 188, 98 168, 104 146" stroke-width="10"/>
        <path d="M60 205 C 44 190, 34 172, 28 152" stroke-width="6"/>
        <path d="M150 192 C 166 176, 176 158, 182 140" stroke-width="6"/>
      </g>
      <g fill="${tone}">
        <circle cx="70"  cy="150" r="46"/>
        <circle cx="110" cy="120" r="54"/>
        <circle cx="150" cy="158" r="44"/>
        <circle cx="98"  cy="180" r="50"/>
        <circle cx="140" cy="120" r="38"/>
        <circle cx="60"  cy="185" r="34"/>
        <circle cx="120" cy="170" r="46"/>
      </g>
    </svg>`;
  }

  // posiciones: x (% centro), ancho px, tono (más oscuro = más cerca)
  const treeConf = [
    {x:7,  w:230, tone:'#2c2212'},
    {x:18, w:185, tone:'#3a2d18'},
    {x:27, w:150, tone:'#48381e'},
    {x:93, w:240, tone:'#2c2212'},
    {x:82, w:190, tone:'#3a2d18'},
    {x:73, w:150, tone:'#48381e'},
    {x:50, w:120, tone:'#52401f'},  // uno lejano al fondo del centro
  ];
  treeConf.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='tree sway' + (i%2?' b':'');
    d.style.left = t.x + '%';
    d.style.width = t.w + 'px';
    d.style.marginLeft = (-t.w/2) + 'px';
    if(t.x===50){ d.style.opacity='0.5'; d.style.filter='blur(2px)'; }
    d.innerHTML = treeSVG(t.tone);
    forest.appendChild(d);
  });

  // --- rayos de sol diagonales desde arriba-derecha ---
  const rays = document.getElementById('rays');
  const rayConf = [
    {x:48, rot:14, dur:9},
    {x:60, rot:16, dur:11},
    {x:70, rot:18, dur:8},
    {x:80, rot:20, dur:12},
    {x:90, rot:22, dur:10},
  ];
  rayConf.forEach((r,i)=>{
    const d=document.createElement('div');
    d.className='ray';
    d.style.left = r.x + '%';
    d.style.transform = 'rotate(' + r.rot + 'deg)';
    d.style.animationDuration = r.dur + 's';
    d.style.animationDelay = (-Math.random()*r.dur) + 's';
    rays.appendChild(d);
  });

  // --- polen flotando, concentrado en la zona iluminada (derecha-centro) ---
  const motes = document.getElementById('motes');
  for(let i=0;i<34;i++){
    const m=document.createElement('div');
    m.className='mote';
    m.style.left = (35 + Math.random()*60) + '%';
    m.style.top  = (15 + Math.random()*70) + '%';
    m.style.animationDuration = (16 + Math.random()*14) + 's';
    m.style.animationDelay = (-Math.random()*28) + 's';
    const sc = 0.4 + Math.random()*0.9;
    m.style.transform = 'scale('+sc+')';
    motes.appendChild(m);
  }

  // --- hojas cálidas cayendo ---
  function leafSVG(){
    const colors = [
      ['#c79a4e','#a87b35'],
      ['#b6884a','#946a2f'],
      ['#a87a3a','#865e26'],
      ['#cf9d52','#a8782f'],
      ['#9c7a3c','#7a5c28']
    ];
    const c = colors[Math.floor(Math.random()*colors.length)];
    return `<svg viewBox="0 0 40 32" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 16 C 12 2, 30 2, 38 16 C 30 30, 12 30, 2 16 Z" fill="${c[0]}" stroke="${c[1]}" stroke-width="1"/>
      <path d="M5 16 L 35 16" stroke="${c[1]}" stroke-width="1" fill="none"/>
      <path d="M14 9 L 20 16 M26 9 L 20 16 M14 23 L 20 16 M26 23 L 20 16" stroke="${c[1]}" stroke-width="0.7" fill="none" opacity="0.6"/>
    </svg>`;
  }
  const leaves = document.getElementById('leaves');
  for(let i=0;i<16;i++){
    const l=document.createElement('div');
    l.className='leaf';
    l.innerHTML = leafSVG();
    l.style.left = (Math.random()*100) + '%';
    l.style.animationDuration = (26 + Math.random()*16) + 's';  // caída lenta
    l.style.animationDelay = (-Math.random()*40) + 's';
    const sc = 0.5 + Math.random()*0.8;
    l.style.transform = 'scale('+sc+')';
    leaves.appendChild(l);
  }
</script>
</body>
</html>
