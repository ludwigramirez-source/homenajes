<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obituario — Tierra</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #8a8d6e;
  }

  .stage-wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, #c4c39a, #8a8d6e);
  }
  .stage {
    position: relative;
    width: 100vw;
    height: 56.25vw;          /* 16:9 */
    max-height: 100vh;
    max-width: 177.78vh;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 42% 55%, rgba(248,244,228,0.92), rgba(248,244,228,0) 50%),
      radial-gradient(ellipse at 75% 30%, rgba(226,216,180,0.7), rgba(226,216,180,0) 55%),
      linear-gradient(150deg, #b9b083 0%, #d8cfa0 28%, #efe9cf 52%, #cdbf90 78%, #a89a6a 100%);
  }

  /* Textura acuarela suave en lento movimiento */
  .watercolor {
    position: absolute; inset: -10%;
    background:
      radial-gradient(circle at 25% 38%, rgba(255,253,240,0.55) 0 9%, transparent 32%),
      radial-gradient(circle at 62% 62%, rgba(255,253,240,0.45) 0 11%, transparent 36%),
      radial-gradient(circle at 82% 28%, rgba(205,180,130,0.4) 0 12%, transparent 40%),
      radial-gradient(circle at 38% 82%, rgba(150,140,95,0.35) 0 10%, transparent 38%);
    filter: blur(9px);
    animation: drift 28s ease-in-out infinite alternate;
  }
  @keyframes drift {
    from { transform: translate(0,0) scale(1.02); }
    to   { transform: translate(2%, 1.5%) scale(1.06); }
  }

  /* Suelo / tierra inferior con suave bruma */
  .ground {
    position:absolute; left:0; right:0; bottom:0; height:26%;
    background: linear-gradient(180deg, rgba(150,135,90,0) 0%, rgba(140,122,80,0.28) 60%, rgba(120,103,64,0.45) 100%);
    filter: blur(2px);
  }

  /* Destellos de luz (motas) */
  .sparkle { position:absolute; width:5px; height:5px; border-radius:50%;
    background: radial-gradient(circle, #fff6da, rgba(255,246,218,0)); opacity:0;
    animation: twinkle 7s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:0; transform:scale(.5);} 50%{opacity:.8; transform:scale(1);} }

  /* Marcos */
  .frame-outer {
    position:absolute; inset:1.2%;
    border: 4px solid #7a6a3f;
    box-shadow: 0 0 16px rgba(90,75,40,.3);
  }
  .frame-inner {
    position:absolute; inset:2.6%;
    border: 2px solid #9a8552;
    box-shadow: inset 0 0 6px rgba(120,100,55,.3);
  }

  /* Árbol (lado derecho) */
  .tree {
    position:absolute; right:-3%; bottom:0; width:46%; height:100%;
    pointer-events:none;
  }
  .tree svg { width:100%; height:100%; overflow:visible; }
  .canopy { transform-box:fill-box; transform-origin: 50% 80%;
            animation: breeze 12s ease-in-out infinite; }
  .canopy.b { animation-duration: 15s; animation-delay:-3s; }
  @keyframes breeze { 0%,100%{transform: rotate(-1.2deg);} 50%{transform: rotate(1.6deg);} }

  /* Hojas cayendo */
  .leaves { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .leaf {
    position:absolute; top:-6%;
    width:22px; height:18px;
    opacity:0;
    animation: fall linear infinite;
  }
  .leaf svg { width:100%; height:100%; }
  @keyframes fall {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    8%   { opacity:.9; }
    92%  { opacity:.85; }
    100% { transform: translateY(118vh) translateX(-90px) rotate(380deg); opacity:.1; }
  }

  /* TEXTO EDITABLE (vacío por defecto) */
  .content { position:absolute; inset:0; }
</style>
</head>
<body>
<div class="stage-wrap">
  <div class="stage" id="stage">

    <div class="watercolor"></div>
    <div class="ground"></div>

    <!-- Árbol -->
    <div class="tree">
      <svg viewBox="0 0 500 800" xmlns="http://www.w3.org/2000/svg">
        <!-- tronco y ramas -->
        <g stroke="#6e5a36" fill="none" stroke-linecap="round">
          <path d="M300 800 C 290 640, 300 520, 310 430" stroke-width="26"/>
          <path d="M310 470 C 270 430, 230 410, 180 400" stroke-width="14"/>
          <path d="M310 450 C 350 410, 400 395, 450 380" stroke-width="14"/>
          <path d="M308 430 C 300 380, 305 340, 320 300" stroke-width="13"/>
          <path d="M210 405 C 175 385, 150 360, 130 330" stroke-width="8"/>
          <path d="M420 388 C 450 365, 470 340, 482 312" stroke-width="8"/>
          <path d="M318 320 C 295 290, 285 260, 285 230" stroke-width="8"/>
          <path d="M322 310 C 350 285, 372 260, 388 232" stroke-width="8"/>
        </g>
        <!-- raíces sutiles -->
        <g stroke="#6e5a36" fill="none" stroke-linecap="round" opacity="0.7">
          <path d="M300 800 C 270 790, 240 786, 210 790" stroke-width="9"/>
          <path d="M300 800 C 340 792, 380 788, 415 792" stroke-width="9"/>
        </g>

        <!-- copa: dos masas de follaje que se mecen -->
        <g class="canopy">
          <g fill="#7d9b58" opacity="0.92">
            <circle cx="250" cy="250" r="95"/>
            <circle cx="330" cy="210" r="105"/>
            <circle cx="410" cy="270" r="90"/>
            <circle cx="300" cy="320" r="100"/>
            <circle cx="390" cy="350" r="80"/>
          </g>
          <g fill="#8fae66" opacity="0.85">
            <circle cx="280" cy="230" r="70"/>
            <circle cx="360" cy="250" r="78"/>
            <circle cx="330" cy="300" r="72"/>
          </g>
        </g>
        <g class="canopy b">
          <g fill="#9cba73" opacity="0.7">
            <circle cx="300" cy="240" r="55"/>
            <circle cx="370" cy="220" r="50"/>
            <circle cx="260" cy="290" r="48"/>
            <circle cx="400" cy="300" r="46"/>
          </g>
          <g fill="#b6cf90" opacity="0.55">
            <circle cx="320" cy="225" r="34"/>
            <circle cx="350" cy="275" r="30"/>
          </g>
        </g>
      </svg>
    </div>

    <!-- Hojas cayendo -->
    <div class="leaves" id="leaves"></div>

    <!-- Marcos -->
    <div class="frame-outer"></div>
    <div class="frame-inner"></div>

    <!-- TEXTO: escribe aquí cuando definamos los campos -->
    <div class="content"></div>

  </div>
</div>

<script>
  // hoja SVG con variación de color
  function leafSVG(){
    const colors = [
      ['#7d9b58','#5e7a3e'],
      ['#a8b566','#86994a'],
      ['#c79a4e','#a87b35'],   // hoja otoñal cálida
      ['#9cba73','#7a9550'],
      ['#b6884a','#946a2f']
    ];
    const c = colors[Math.floor(Math.random()*colors.length)];
    return `<svg viewBox="0 0 40 32" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 16 C 12 2, 30 2, 38 16 C 30 30, 12 30, 2 16 Z" fill="${c[0]}" stroke="${c[1]}" stroke-width="1"/>
      <path d="M5 16 L 35 16" stroke="${c[1]}" stroke-width="1" fill="none"/>
      <path d="M14 9 L 20 16 M26 9 L 20 16 M14 23 L 20 16 M26 23 L 20 16" stroke="${c[1]}" stroke-width="0.7" fill="none" opacity="0.6"/>
    </svg>`;
  }

  const leaves = document.getElementById('leaves');
  const N = 18;
  for(let i=0;i<N;i++){
    const l = document.createElement('div');
    l.className = 'leaf';
    l.innerHTML = leafSVG();
    // caen sobre todo desde el lado del árbol pero distribuidas
    l.style.left = (Math.random()*100) + '%';
    l.style.animationDuration = (26 + Math.random()*16) + 's';  // caída lenta
    l.style.animationDelay = (-Math.random()*40) + 's';
    const sc = 0.5 + Math.random()*0.8;
    l.style.transform = 'scale('+sc+')';
    leaves.appendChild(l);
  }

  // motas de luz
  const stage = document.getElementById('stage');
  for(let i=0;i<24;i++){
    const sp=document.createElement('div');
    sp.className='sparkle';
    sp.style.left=(Math.random()*100)+'%';
    sp.style.top=(Math.random()*100)+'%';
    sp.style.animationDelay=(-Math.random()*7)+'s';
    stage.appendChild(sp);
  }
</script>
</body>
</html>
