<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obituario — Aire</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width:100%; height:100%; background:#bcd2e0; }

  .stage-wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, #dcebf4, #aac6da);
  }
  .stage {
    position: relative;
    width:100vw; height:56.25vw; max-height:100vh; max-width:177.78vh;
    overflow:hidden;
    background:
      radial-gradient(ellipse at 45% 50%, rgba(255,255,255,0.95), rgba(255,255,255,0) 52%),
      radial-gradient(ellipse at 78% 28%, rgba(232,243,250,0.7), rgba(232,243,250,0) 55%),
      linear-gradient(150deg, #b3d0e2 0%, #d2e6f1 30%, #f3f9fc 55%, #c6dded 80%, #aacadd 100%);
  }

  .watercolor {
    position:absolute; inset:-10%;
    background:
      radial-gradient(circle at 25% 38%, rgba(255,255,255,0.6) 0 9%, transparent 32%),
      radial-gradient(circle at 62% 62%, rgba(255,255,255,0.5) 0 11%, transparent 36%),
      radial-gradient(circle at 82% 28%, rgba(210,230,245,0.45) 0 12%, transparent 40%),
      radial-gradient(circle at 38% 82%, rgba(190,215,235,0.4) 0 10%, transparent 38%);
    filter: blur(9px);
    animation: drift 30s ease-in-out infinite alternate;
  }
  @keyframes drift { from{transform:translate(0,0) scale(1.02);} to{transform:translate(2%,1.5%) scale(1.06);} }

  /* Nubes que cruzan lentamente */
  .clouds { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .cloud {
    position:absolute;
    filter: blur(4px);
    opacity:0;
    animation: cross linear infinite;
  }
  .cloud svg { display:block; }
  @keyframes cross {
    0%   { transform: translateX(-30vw); opacity:0; }
    12%  { opacity:.85; }
    88%  { opacity:.85; }
    100% { transform: translateX(110vw); opacity:0; }
  }

  .sparkle { position:absolute; width:5px; height:5px; border-radius:50%;
    background: radial-gradient(circle, #fff, rgba(255,255,255,0)); opacity:0;
    animation: twinkle 7s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:0; transform:scale(.5);} 50%{opacity:.8; transform:scale(1);} }

  .frame-outer { position:absolute; inset:1.2%; border:4px solid #6f93ab;
    box-shadow:0 0 16px rgba(90,120,140,.3); }
  .frame-inner { position:absolute; inset:2.6%; border:2px solid #8aabc1;
    box-shadow: inset 0 0 6px rgba(110,140,160,.3); }

  /* Plumas que flotan a la deriva */
  .feathers { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .feather {
    position:absolute; top:-8%;
    width:30px; height:48px;
    opacity:0;
    animation: driftDown linear infinite;
  }
  .feather svg { width:100%; height:100%; }
  @keyframes driftDown {
    0%   { transform: translateY(0) translateX(0) rotate(-10deg); opacity:0; }
    10%  { opacity:.9; }
    90%  { opacity:.85; }
    100% { transform: translateY(120vh) translateX(140px) rotate(40deg); opacity:.1; }
  }

  /* Líneas de viento sutiles */
  .wind { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .gust { position:absolute; height:2px; border-radius:2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
    opacity:0; animation: gust linear infinite; }
  @keyframes gust {
    0%{ transform:translateX(-20vw) scaleX(.6); opacity:0; }
    30%{ opacity:.7; }
    70%{ opacity:.7; }
    100%{ transform:translateX(60vw) scaleX(1.2); opacity:0; }
  }

  .content { position:absolute; inset:0; }
</style>
</head>
<body>
<div class="stage-wrap">
  <div class="stage" id="stage">

    <div class="watercolor"></div>

    <!-- Nubes -->
    <div class="clouds" id="clouds"></div>

    <!-- Viento -->
    <div class="wind" id="wind"></div>

    <!-- Plumas -->
    <div class="feathers" id="feathers"></div>

    <div class="frame-outer"></div>
    <div class="frame-inner"></div>
    <div class="content"></div>

  </div>
</div>

<script>
  const ns="http://www.w3.org/2000/svg";

  function cloudSVG(w){
    return `<svg width="${w}" height="${w*0.5}" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
      <g fill="#ffffff" opacity="0.9">
        <ellipse cx="60" cy="65" rx="55" ry="30"/>
        <ellipse cx="110" cy="55" rx="50" ry="35"/>
        <ellipse cx="150" cy="68" rx="45" ry="26"/>
        <ellipse cx="95" cy="72" rx="60" ry="24"/>
      </g>
    </svg>`;
  }
  const clouds = document.getElementById('clouds');
  for(let i=0;i<6;i++){
    const c=document.createElement('div');
    c.className='cloud';
    const w = 180 + Math.random()*220;
    c.innerHTML = cloudSVG(w);
    c.style.top = (5 + Math.random()*60) + '%';
    c.style.animationDuration = (40 + Math.random()*35) + 's';  // muy lento
    c.style.animationDelay = (-Math.random()*60) + 's';
    c.style.opacity = 0.5 + Math.random()*0.4;
    clouds.appendChild(c);
  }

  function featherSVG(){
    const tints = ['#ffffff','#eaf2f8','#dcebf4','#cfe0ee'];
    const t = tints[Math.floor(Math.random()*tints.length)];
    return `<svg viewBox="0 0 40 64" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 2 C 33 18, 33 44, 22 62 C 21 50, 21 30, 20 2 Z" fill="${t}" stroke="#a9c0d2" stroke-width="1"/>
      <path d="M20 2 C 7 18, 7 44, 18 62 C 19 50, 19 30, 20 2 Z" fill="${t}" stroke="#a9c0d2" stroke-width="1" opacity="0.95"/>
      <line x1="20" y1="4" x2="20" y2="60" stroke="#9bb4c8" stroke-width="1.4"/>
      <g stroke="#bcd0df" stroke-width="0.6" opacity="0.7">
        <line x1="20" y1="16" x2="12" y2="12"/><line x1="20" y1="16" x2="28" y2="12"/>
        <line x1="20" y1="28" x2="11" y2="25"/><line x1="20" y1="28" x2="29" y2="25"/>
        <line x1="20" y1="40" x2="13" y2="39"/><line x1="20" y1="40" x2="27" y2="39"/>
      </g>
    </svg>`;
  }
  const feathers = document.getElementById('feathers');
  for(let i=0;i<10;i++){
    const f=document.createElement('div');
    f.className='feather';
    f.innerHTML = featherSVG();
    f.style.left = (Math.random()*90) + '%';
    f.style.animationDuration = (22 + Math.random()*16) + 's';  // lento
    f.style.animationDelay = (-Math.random()*30) + 's';
    const sc = 0.5 + Math.random()*0.7;
    f.style.transform = 'scale('+sc+')';
    feathers.appendChild(f);
  }

  const wind = document.getElementById('wind');
  for(let i=0;i<7;i++){
    const g=document.createElement('div');
    g.className='gust';
    g.style.top = (10 + Math.random()*80) + '%';
    g.style.left = (Math.random()*30) + '%';
    g.style.width = (120 + Math.random()*200) + 'px';
    g.style.animationDuration = (14 + Math.random()*10) + 's';
    g.style.animationDelay = (-Math.random()*20) + 's';
    wind.appendChild(g);
  }

  const stage = document.getElementById('stage');
  for(let i=0;i<22;i++){
    const sp=document.createElement('div');
    sp.className='sparkle';
    sp.style.left=(Math.random()*100)+'%';
    sp.style.top=(Math.random()*100)+'%';
    sp.style.animationDelay=(-Math.random()*7)+'s';
    stage.appendChild(sp);
  }
</script>
</body>
</html>
