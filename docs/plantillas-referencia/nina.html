<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obituario</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Tangerine:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #d8c4c0;
    font-family: 'Cormorant Garamond', serif;
  }

  /* Lienzo 16:9 que escala al viewport manteniendo proporción */
  .stage-wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, #e9dad4, #cdb6b4);
  }
  .stage {
    position: relative;
    width: 100vw;
    height: 56.25vw;          /* 16:9 */
    max-height: 100vh;
    max-width: 177.78vh;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 30% 55%, rgba(255,252,250,0.9), rgba(255,252,250,0) 45%),
      radial-gradient(ellipse at 70% 30%, rgba(245,228,228,0.8), rgba(245,228,228,0) 55%),
      linear-gradient(135deg, #ead7d6 0%, #f2e6e0 35%, #ecd9d6 70%, #ddc4c4 100%);
  }

  /* Textura acuarela suave en lento movimiento */
  .watercolor {
    position: absolute; inset: -10%;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.55) 0 8%, transparent 30%),
      radial-gradient(circle at 65% 70%, rgba(255,255,255,0.45) 0 10%, transparent 35%),
      radial-gradient(circle at 80% 20%, rgba(238,210,210,0.5) 0 12%, transparent 40%),
      radial-gradient(circle at 40% 80%, rgba(255,248,245,0.5) 0 10%, transparent 38%);
    filter: blur(8px);
    animation: drift 18s ease-in-out infinite alternate;
  }
  @keyframes drift {
    from { transform: translate(0,0) scale(1.02); }
    to   { transform: translate(2%, 1.5%) scale(1.06); }
  }

  /* Destellos / partículas de luz */
  .sparkle { position:absolute; width:4px; height:4px; border-radius:50%;
    background: radial-gradient(circle, #fff, rgba(255,255,255,0)); opacity:.0;
    animation: twinkle 4s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:0; transform:scale(.5);} 50%{opacity:.9; transform:scale(1);} }

  /* Marcos */
  .frame-outer {
    position:absolute; inset:1.2%;
    border: 6px solid #fdfbfa;
    box-shadow: 0 0 18px rgba(160,120,120,.25);
  }
  .frame-gold {
    position:absolute; inset:2.6%;
    border: 2px solid #d4af37;
    box-shadow: inset 0 0 8px rgba(212,175,55,.35), 0 0 6px rgba(212,175,55,.25);
  }
  .divider {
    position:absolute; left:4.5%; right:4.5%; top:40%;
    height:2px;
    background: linear-gradient(90deg, transparent, #d4af37 12%, #e7c659 50%, #d4af37 88%, transparent);
    box-shadow: 0 0 6px rgba(212,175,55,.5);
  }

  /* Rama de cerezo (derecha) */
  .branch {
    position:absolute; right:-2%; top:-2%; width:42%; height:104%;
    pointer-events:none;
  }
  .branch svg { width:100%; height:100%; }
  .blossom { transform-box: fill-box; transform-origin: center;
    animation: bloom 6s ease-in-out infinite; }
  @keyframes bloom { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }

  /* Mariposas */
  .butterfly { position:absolute; transform-box:fill-box; }
  .wing { transform-box:fill-box; transform-origin: 100% 50%; }
  .wing.right { transform-origin: 0% 50%; }
  .flap .wing.left  { animation: flapL 1.1s ease-in-out infinite; }
  .flap .wing.right { animation: flapR 1.1s ease-in-out infinite; }
  @keyframes flapL { 0%,100%{transform: rotateY(0deg);} 50%{transform: rotateY(65deg);} }
  @keyframes flapR { 0%,100%{transform: rotateY(0deg);} 50%{transform: rotateY(-65deg);} }

  .float1 { animation: float1 18s ease-in-out infinite; }
  .float2 { animation: float2 22s ease-in-out infinite; }
  .float3 { animation: float3 16s ease-in-out infinite; }
  @keyframes float1 { 0%,100%{transform:translate(0,0) rotate(-4deg);} 50%{transform:translate(14px,-18px) rotate(4deg);} }
  @keyframes float2 { 0%,100%{transform:translate(0,0) rotate(3deg);} 50%{transform:translate(-12px,-14px) rotate(-5deg);} }
  @keyframes float3 { 0%,100%{transform:translate(0,0) rotate(0deg);} 50%{transform:translate(8px,-22px) rotate(6deg);} }

  /* Pétalos cayendo */
  .petals { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .petal {
    position:absolute; top:-6%;
    width:18px; height:14px;
    background: radial-gradient(circle at 30% 30%, #f7c9d4, #e89bb0);
    border-radius: 60% 0 60% 0;
    opacity:.85;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    8%   { opacity:.9; }
    100% { transform: translateY(120vh) translateX(-60px) rotate(420deg); opacity:.15; }
  }

  /* TEXTO EDITABLE */
  .content { position:absolute; inset:0; display:flex; flex-direction:column;
             align-items:center; text-align:center; color:#7a5a5c; padding:5% 8%; }
  .eyebrow { margin-top:9.5%; font-size: 1.6vw; letter-spacing:.35em;
             text-transform:uppercase; color:#a07e6e; font-weight:500; }
  .name    { font-family:'Tangerine', cursive; font-size: 8vw; line-height:.9;
             color:#6e4f52; margin-top:.4%; text-shadow:0 2px 6px rgba(150,110,110,.25); }
  .dates   { position:absolute; top:43%; width:100%; font-size:2.1vw;
             font-style:italic; color:#8a6a6c; letter-spacing:.05em; }
  .message { position:absolute; top:55%; width:70%; left:15%; font-size:1.9vw;
             line-height:1.5; color:#7a5a5c; }
  .verse   { position:absolute; bottom:7%; width:100%; font-style:italic;
             font-size:1.5vw; color:#9a7a7c; }

  @media (max-width:700px){
    .eyebrow{font-size:3.2vw;} .name{font-size:16vw;}
    .dates{font-size:4.2vw;} .message{font-size:3.6vw; width:84%; left:8%;}
    .verse{font-size:3vw;}
  }
</style>
</head>
<body>
<div class="stage-wrap">
  <div class="stage" id="stage">

    <div class="watercolor"></div>

    <!-- Rama de cerezo -->
    <div class="branch">
      <svg viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#9a7d72" fill="none" stroke-linecap="round">
          <path d="M400 40 C 320 120, 300 240, 250 380 C 220 470, 210 560, 240 700" stroke-width="7"/>
          <path d="M300 200 C 240 250, 210 330, 180 430" stroke-width="5"/>
          <path d="M260 360 C 210 400, 190 470, 175 560" stroke-width="5"/>
          <path d="M330 300 C 300 380, 300 470, 320 600" stroke-width="5"/>
          <path d="M250 380 C 300 420, 340 470, 360 560" stroke-width="4"/>
        </g>
        <g fill="#f3b9c6" stroke="#e89bb0" stroke-width="1">
          <!-- racimos de flores -->
          <g class="blossom" style="animation-delay:0s">
            <circle cx="250" cy="380" r="9"/><circle cx="262" cy="372" r="7"/>
            <circle cx="240" cy="372" r="7"/><circle cx="256" cy="392" r="7"/>
            <circle cx="244" cy="392" r="7"/><circle cx="251" cy="380" r="3" fill="#fff5d6"/>
          </g>
          <g class="blossom" style="animation-delay:1.2s">
            <circle cx="180" cy="430" r="8"/><circle cx="191" cy="423" r="6"/>
            <circle cx="170" cy="423" r="6"/><circle cx="186" cy="441" r="6"/>
            <circle cx="174" cy="441" r="6"/>
          </g>
          <g class="blossom" style="animation-delay:0.6s">
            <circle cx="320" cy="500" r="9"/><circle cx="332" cy="492" r="7"/>
            <circle cx="308" cy="492" r="7"/><circle cx="326" cy="513" r="7"/>
            <circle cx="314" cy="513" r="7"/><circle cx="321" cy="500" r="3" fill="#fff5d6"/>
          </g>
          <g class="blossom" style="animation-delay:1.8s">
            <circle cx="175" cy="560" r="8"/><circle cx="186" cy="553" r="6"/>
            <circle cx="165" cy="553" r="6"/><circle cx="181" cy="571" r="6"/>
            <circle cx="169" cy="571" r="6"/>
          </g>
          <g class="blossom" style="animation-delay:2.4s">
            <circle cx="360" cy="560" r="8"/><circle cx="371" cy="553" r="6"/>
            <circle cx="350" cy="553" r="6"/><circle cx="366" cy="571" r="6"/>
            <circle cx="354" cy="571" r="6"/>
          </g>
          <g class="blossom" style="animation-delay:3s">
            <circle cx="300" cy="180" r="8"/><circle cx="311" cy="173" r="6"/>
            <circle cx="290" cy="173" r="6"/><circle cx="306" cy="191" r="6"/>
            <circle cx="294" cy="191" r="6"/>
          </g>
        </g>
      </svg>
    </div>

    <!-- Pétalos -->
    <div class="petals" id="petals"></div>

    <!-- Mariposas -->
    <div class="butterfly flap float1" style="left:18%; top:58%; width:9%;">
      <svg viewBox="0 0 120 100"><g>
        <path class="wing left" d="M60 50 C 10 0, 0 60, 55 60 C 40 80, 50 95, 60 70 Z" fill="#f7d4dc" stroke="#b98e92" stroke-width="1.5"/>
        <path class="wing right" d="M60 50 C 110 0, 120 60, 65 60 C 80 80, 70 95, 60 70 Z" fill="#f7d4dc" stroke="#b98e92" stroke-width="1.5"/>
        <line x1="60" y1="40" x2="60" y2="78" stroke="#9a7d72" stroke-width="2"/>
      </g></svg>
    </div>
    <div class="butterfly flap float2" style="left:8%; top:70%; width:8%; animation-delay:.2s;">
      <svg viewBox="0 0 120 100"><g>
        <path class="wing left" d="M60 50 C 10 0, 0 60, 55 60 C 40 80, 50 95, 60 70 Z" fill="#f5c8d2" stroke="#b98e92" stroke-width="1.5"/>
        <path class="wing right" d="M60 50 C 110 0, 120 60, 65 60 C 80 80, 70 95, 60 70 Z" fill="#f5c8d2" stroke="#b98e92" stroke-width="1.5"/>
        <line x1="60" y1="40" x2="60" y2="78" stroke="#9a7d72" stroke-width="2"/>
      </g></svg>
    </div>
    <div class="butterfly flap float3" style="left:30%; top:62%; width:5%;">
      <svg viewBox="0 0 120 100"><g>
        <path class="wing left" d="M60 50 C 10 0, 0 60, 55 60 C 40 80, 50 95, 60 70 Z" fill="#fae0e6" stroke="#b98e92" stroke-width="1.5"/>
        <path class="wing right" d="M60 50 C 110 0, 120 60, 65 60 C 80 80, 70 95, 60 70 Z" fill="#fae0e6" stroke="#b98e92" stroke-width="1.5"/>
        <line x1="60" y1="40" x2="60" y2="78" stroke="#9a7d72" stroke-width="2"/>
      </g></svg>
    </div>
    <div class="butterfly flap float1" style="left:43%; top:55%; width:5%; animation-delay:1s;">
      <svg viewBox="0 0 120 100"><g>
        <path class="wing left" d="M60 50 C 10 0, 0 60, 55 60 C 40 80, 50 95, 60 70 Z" fill="#fae0e6" stroke="#b98e92" stroke-width="1.5"/>
        <path class="wing right" d="M60 50 C 110 0, 120 60, 65 60 C 80 80, 70 95, 60 70 Z" fill="#fae0e6" stroke="#b98e92" stroke-width="1.5"/>
        <line x1="60" y1="40" x2="60" y2="78" stroke="#9a7d72" stroke-width="2"/>
      </g></svg>
    </div>
    <div class="butterfly flap float2" style="left:11%; top:36%; width:4%; animation-delay:.5s;">
      <svg viewBox="0 0 120 100"><g>
        <path class="wing left" d="M60 50 C 10 0, 0 60, 55 60 C 40 80, 50 95, 60 70 Z" fill="#fae0e6" stroke="#b98e92" stroke-width="1.5"/>
        <path class="wing right" d="M60 50 C 110 0, 120 60, 65 60 C 80 80, 70 95, 60 70 Z" fill="#fae0e6" stroke="#b98e92" stroke-width="1.5"/>
        <line x1="60" y1="40" x2="60" y2="78" stroke="#9a7d72" stroke-width="2"/>
      </g></svg>
    </div>

    <!-- Marcos -->
    <div class="frame-outer"></div>
    <div class="frame-gold"></div>

  </div>
</div>

<script>
  // Generar pétalos
  const petals = document.getElementById('petals');
  for (let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='petal';
    p.style.left = (Math.random()*100)+'%';
    p.style.animationDuration = (14+Math.random()*10)+'s';
    p.style.animationDelay = (-Math.random()*16)+'s';
    p.style.transform = 'scale('+(0.6+Math.random()*0.8)+')';
    petals.appendChild(p);
  }
  // Generar destellos
  const stage = document.getElementById('stage');
  for (let i=0;i<25;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    s.style.left=(Math.random()*100)+'%';
    s.style.top=(Math.random()*100)+'%';
    s.style.animationDelay=(-Math.random()*4)+'s';
    stage.appendChild(s);
  }
</script>
</body>
</html>
