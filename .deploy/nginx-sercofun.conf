# Nginx vhost para SERCOFUN Homenajes Digitales
# Frontend + API en el mismo dominio; API bajo /api/, uploads bajo /uploads/
server {
    listen 80;
    listen [::]:80;
    server_name hwlosolivos.iptegra.co;

    # Subir hasta 10 MB (fotos del difunto + adjuntos del formulario)
    client_max_body_size 10M;

    # Logs por sitio
    access_log /var/log/nginx/sercofun.access.log;
    error_log  /var/log/nginx/sercofun.error.log;

    # API: ruteo a backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # SSR del display: las pantallas LG con WebKit antiguo no soportan React SPA,
    # asi que esta ruta especifica va al backend (HTML estatico pre-renderizado).
    location /digital-display-screen/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Uploads servidos por el backend (fotos del difunto y de visitantes)
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            30d;
        add_header         Cache-Control "public";
    }

    # Frontend (SPA servido por Nginx interno del contenedor)
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
