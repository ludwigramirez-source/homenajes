version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sercofun_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sercofun_homenajes}
      POSTGRES_USER: ${DB_USER:-sercofun_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ChangeMeInProduction2026!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sercofun_admin} -d ${DB_NAME:-sercofun_homenajes}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sercofun_network

  backend:
    build: .
    container_name: sercofun_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3001}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-sercofun_homenajes}
      DB_USER: ${DB_USER:-sercofun_admin}
      DB_PASSWORD: ${DB_PASSWORD:-ChangeMeInProduction2026!}
      JWT_SECRET: ${JWT_SECRET:-cambia-esta-clave-secreta-en-produccion}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - sercofun_network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  sercofun_network:
    driver: bridge
